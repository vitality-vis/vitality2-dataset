name: Deploy dashboard

on:
  push:
    branches: [main]
    paths:
      - dashboard/**
      - .github/workflows/deploy-dashboard.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp dashboard/index.html dashboard/coverage.html _site/
          cp -R dashboard/coverage-tests _site/coverage-tests
          # Keep local-only fixtures and Python helpers off the static site.
          rm -rf _site/coverage-tests/inputs
          rm -f _site/coverage-tests/**/*.py 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
