<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vitality2 Paper Stats</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #18212f;
      --muted: #667085;
      --line: #d8dee8;
      --blue: #2563eb;
      --red: #dc2626;
      --amber: #d97706;
      --green: #15803d;
      --purple: #7c3aed;
      --cyan: #0891b2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 { margin: 0 0 12px; font-size: 20px; font-weight: 650; }
    h2 { margin: 0 0 14px; font-size: 16px; font-weight: 650; }
    h3 { margin: 10px 0 8px; font-size: 13px; font-weight: 650; color: var(--muted); }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-header h2 { margin: 0; }
    .export-btn {
      height: 30px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      border-color: var(--line);
      font-weight: 500;
      font-size: 12px;
      flex-shrink: 0;
    }
    .export-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 1.2fr) minmax(260px, 1.4fr) 180px 120px;
      gap: 10px;
      align-items: end;
    }
    header.collapsed { padding-bottom: 12px; }
    header.collapsed #settingsRow { display: none; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 28px;
    }
    .settings-toggle {
      display: none;
      height: 28px;
      padding: 0 9px;
      background: #fff;
      color: var(--text);
      border-color: var(--line);
      font-size: 12px;
      font-weight: 600;
    }
    header.collapsed .settings-toggle { display: inline-flex; align-items: center; }
    label { display: grid; gap: 4px; color: var(--muted); font-size: 12px; }
    input, select, button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    button {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      font-weight: 600;
      cursor: pointer;
    }
    main { padding: 20px 24px 36px; display: grid; gap: 18px; }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      overflow: auto;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 12px;
    }
    .metric {
      background: #f9fafb;
      border: 1px solid #e6e9ef;
      border-radius: 8px;
      padding: 12px;
    }
    .metric .value { font-size: 24px; font-weight: 700; margin-top: 2px; }
    .muted { color: var(--muted); }
    .status { min-height: 20px; color: var(--muted); }
    .chart { width: 100%; overflow: auto; }
    svg { display: block; max-width: none; }
    .bar-label { fill: var(--text); font-size: 12px; }
    .axis { stroke: #98a2b3; stroke-width: 1; }
    .grid { stroke: #eef1f5; stroke-width: 1; }
    .mark {
      cursor: pointer;
      transition: opacity 120ms ease, stroke-width 120ms ease, filter 120ms ease;
    }
    .mark:hover {
      opacity: 0.86;
      stroke: #111827;
      stroke-width: 1.5;
      filter: drop-shadow(0 2px 3px rgba(15, 23, 42, 0.22));
    }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; color: var(--muted); }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .source-actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 14px; }
    .source-actions button {
      height: 30px;
      background: #fff;
      color: var(--text);
      border-color: var(--line);
      font-weight: 500;
    }
    .source-actions button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    table { border-collapse: collapse; width: 100%; min-width: 780px; }
    th, td { border-bottom: 1px solid #edf0f4; padding: 8px 10px; text-align: left; white-space: nowrap; }
    th { color: var(--muted); font-size: 12px; font-weight: 650; background: #fafbfc; position: sticky; top: 0; }
    .error { color: #b42318; }
    .tooltip {
      position: fixed;
      display: none;
      pointer-events: none;
      z-index: 20;
      max-width: 360px;
      padding: 10px 12px;
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.16);
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
    }
    .tooltip strong { display: block; font-size: 13px; margin-bottom: 4px; }
    .tooltip .muted-line { color: var(--muted); }
    @media (max-width: 920px) {
      .controls { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header id="pageHeader">
    <h1>Vitality2 Paper Stats Dashboard</h1>
    <div class="controls" id="settingsRow">
      <label>Zilliz URI
        <input id="uri" placeholder="https://xxx.api.region.zillizcloud.com" />
      </label>
      <label>Zilliz Token
        <input id="token" type="password" placeholder="Paste token here" />
      </label>
      <label>Stats collection
        <input id="statsCollection" value="paper_stats" />
      </label>
      <button id="loadBtn">Load</button>
    </div>
    <div class="status-row">
      <div id="status" class="status"></div>
      <button id="settingsToggle" class="settings-toggle">Show settings</button>
    </div>
  </header>

  <main>
    <section class="summary" id="summary"></section>

    <section>
      <h2>Source / DBLP Source Composition</h2>
      <div id="dblpChart" class="chart"></div>
    </section>

    <section>
      <h2>Source Completeness</h2>
      <div class="legend">
        <span><i class="swatch" style="background: var(--amber)"></i> Missing DOI only</span>
        <span><i class="swatch" style="background: var(--red)"></i> Missing abstract only</span>
        <span><i class="swatch" style="background: var(--purple)"></i> Missing both</span>
        <span><i class="swatch" style="background: var(--green)"></i> Complete</span>
      </div>
      <div id="qualityChart" class="chart"></div>
    </section>

    <section>
      <div class="section-header">
        <h2>Source / Year Heatmap</h2>
        <button id="exportHeatmapCsv" class="export-btn" disabled>Export CSV</button>
      </div>
      <div id="heatmap" class="chart"></div>
      <h3>Source year details</h3>
      <div id="sourceButtons" class="source-actions"></div>
      <div id="sourceYearChart" class="chart"></div>
    </section>

    <section>
      <h2>Source / DBLP Source Table</h2>
      <div id="dblpTable"></div>
    </section>
  </main>
  <div id="tooltip" class="tooltip"></div>

  <script>
    const DEFAULT_URI = "";
    const DEFAULT_TOKEN = "";
    const SOURCE_COLLECTION = "paper_new";
    const FIELDS = [
      "stat_key", "stat_type", "source_collection", "source", "dblp_source", "year",
      "paper_count", "missing_doi_count", "missing_abstract_count", "complete_count", "generated_at"
    ];

    const $ = (id) => document.getElementById(id);
    $("uri").value = localStorage.getItem("zilliz_uri") || DEFAULT_URI;
    $("token").value = localStorage.getItem("zilliz_token") || DEFAULT_TOKEN;

    let heatmapRows = [];

    function fmt(n) { return Number(n || 0).toLocaleString(); }
    function csvCell(value) {
      const text = String(value ?? "");
      return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }
    function downloadCsv(filename, rows) {
      const csv = rows.map(row => row.map(csvCell).join(",")).join("\n") + "\n";
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }
    function exportHeatmapCsv() {
      if (!heatmapRows.length) return;
      const sources = [...new Set(heatmapRows.map(r => r.source))].sort();
      const byKey = new Map(heatmapRows.map(r => [`${r.source}::${r.year}`, Number(r.paper_count || 0)]));
      const years = [...new Set(heatmapRows.map(r => Number(r.year)).filter(Boolean))].sort((a, b) => a - b);
      const out = [["source", ...years]];
      sources.forEach(source => {
        out.push([source, ...years.map(year => byKey.get(`${source}::${year}`) || 0)]);
      });
      downloadCsv("source_year_heatmap.csv", out);
    }
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function tooltipHtml(title, rows) {
      return `<strong>${esc(title)}</strong>${rows.map(([k, v]) => `<div><span class="muted-line">${esc(k)}:</span> ${esc(v)}</div>`).join("")}`;
    }
    function dataTip(title, rows) {
      return esc(tooltipHtml(title, rows));
    }
    function bindTooltips(root = document) {
      const tip = $("tooltip");
      root.querySelectorAll("[data-tip]").forEach(el => {
        el.addEventListener("mousemove", (event) => {
          tip.innerHTML = el.dataset.tip;
          tip.style.display = "block";
          const pad = 14;
          const rect = tip.getBoundingClientRect();
          let x = event.clientX + pad;
          let y = event.clientY + pad;
          if (x + rect.width > window.innerWidth - 8) x = event.clientX - rect.width - pad;
          if (y + rect.height > window.innerHeight - 8) y = event.clientY - rect.height - pad;
          tip.style.left = `${Math.max(8, x)}px`;
          tip.style.top = `${Math.max(8, y)}px`;
        });
        el.addEventListener("mouseleave", () => {
          tip.style.display = "none";
        });
      });
    }

    async function queryStats(uri, token, collection) {
      const body = {
        collectionName: collection,
        filter: `source_collection == "${SOURCE_COLLECTION}"`,
        outputFields: FIELDS,
        limit: 10000
      };
      const res = await fetch(uri.replace(/\/$/, "") + "/v2/vectordb/entities/query", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const payload = await res.json();
      if (!res.ok || payload.code !== 0) throw new Error(payload.message || res.statusText);
      return payload.data || [];
    }

    function normalize(rows) {
      const byType = {
        source_year: [],
        source_dblp_completeness: [],
        source_summary: []
      };
      for (const row of rows) {
        if (byType[row.stat_type]) byType[row.stat_type].push(row);
      }
      byType.source_year.sort((a, b) => String(a.source).localeCompare(String(b.source)) || Number(a.year) - Number(b.year));
      byType.source_dblp_completeness.sort((a, b) => String(a.source).localeCompare(String(b.source)) || String(a.dblp_source).localeCompare(String(b.dblp_source)));
      byType.source_summary.sort((a, b) => String(a.source).localeCompare(String(b.source)));
      return byType;
    }

    function renderSummary(data) {
      const total = data.source_summary.reduce((s, r) => s + Number(r.paper_count || 0), 0);
      const missingDoi = data.source_summary.reduce((s, r) => s + Number(r.missing_doi_count || 0), 0);
      const missingAbs = data.source_summary.reduce((s, r) => s + Number(r.missing_abstract_count || 0), 0);
      const complete = data.source_summary.reduce((s, r) => s + Number(r.complete_count || 0), 0);
      $("summary").innerHTML = [
        ["Papers", total],
        ["Sources", data.source_summary.length],
        ["Missing DOI", missingDoi],
        ["Complete", complete]
      ].map(([label, value]) => `<div class="metric"><div class="muted">${label}</div><div class="value">${fmt(value)}</div></div>`).join("");
    }

    function renderDblpComposition(rows) {
      const sources = [...new Set(rows.map(r => r.source))].sort();
      const maxTotal = Math.max(1, ...sources.map(src => rows.filter(r => r.source === src).reduce((s, r) => s + Number(r.paper_count || 0), 0)));
      const width = 1200, left = 190, right = 80, rowH = 28, top = 18;
      const height = top + sources.length * rowH + 28;
      const palette = ["#2563eb", "#0891b2", "#15803d", "#d97706", "#7c3aed", "#dc2626", "#475467", "#0f766e"];
      let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;
      sources.forEach((src, i) => {
        const y = top + i * rowH;
        const parts = rows.filter(r => r.source === src).sort((a, b) => Number(b.paper_count) - Number(a.paper_count));
        const total = parts.reduce((s, r) => s + Number(r.paper_count || 0), 0);
        svg += `<text x="8" y="${y + 17}" class="bar-label">${esc(src)}</text>`;
        let x = left;
        parts.forEach((r, j) => {
          const w = (Number(r.paper_count || 0) / maxTotal) * (width - left - right);
          const tip = dataTip("DBLP source", [
            ["Source", r.source],
            ["DBLP source", r.dblp_source],
            ["Papers", fmt(r.paper_count)],
            ["Missing DOI", fmt(r.missing_doi_count)],
            ["Missing abstract", fmt(r.missing_abstract_count)],
            ["Complete", fmt(r.complete_count)]
          ]);
          svg += `<rect class="mark" data-tip="${tip}" x="${x}" y="${y + 4}" width="${Math.max(1, w)}" height="16" fill="${palette[j % palette.length]}"></rect>`;
          x += w;
        });
        svg += `<text x="${x + 8}" y="${y + 17}" class="bar-label">${fmt(total)}</text>`;
      });
      svg += `</svg>`;
      $("dblpChart").innerHTML = svg;
      bindTooltips($("dblpChart"));
    }

    function completenessBreakdown(row) {
      const total = Number(row.paper_count || 0);
      const missingDoi = Number(row.missing_doi_count || 0);
      const missingAbs = Number(row.missing_abstract_count || 0);
      const complete = Number(row.complete_count || 0);
      const both = Math.max(0, missingDoi + missingAbs + complete - total);
      return {
        doiOnly: Math.max(0, missingDoi - both),
        absOnly: Math.max(0, missingAbs - both),
        both,
        complete
      };
    }

    function renderQualityChart(rows) {
      const width = 1200, left = 190, right = 100, rowH = 28, top = 18;
      const height = top + rows.length * rowH + 28;
      let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;
      rows.forEach((r, i) => {
        const y = top + i * rowH;
        const total = Math.max(1, Number(r.paper_count || 0));
        const parts = completenessBreakdown(r);
        const series = [
          ["doiOnly", parts.doiOnly, "var(--amber)", "Missing DOI only"],
          ["absOnly", parts.absOnly, "var(--red)", "Missing abstract only"],
          ["both", parts.both, "var(--purple)", "Missing both"],
          ["complete", parts.complete, "var(--green)", "Complete"]
        ];
        svg += `<text x="8" y="${y + 17}" class="bar-label">${esc(r.source)}</text>`;
        let x = left;
        series.forEach(([, value, color, label]) => {
          const w = (value / total) * (width - left - right);
          const tip = dataTip("Source completeness", [
            ["Source", r.source],
            ["Category", label],
            ["Count", fmt(value)],
            ["Total", fmt(total)],
            ["Missing DOI", fmt(r.missing_doi_count)],
            ["Missing abstract", fmt(r.missing_abstract_count)],
            ["Complete", fmt(r.complete_count)]
          ]);
          if (w > 0) svg += `<rect class="mark" data-tip="${tip}" x="${x}" y="${y + 4}" width="${Math.max(1, w)}" height="16" fill="${color}"></rect>`;
          x += w;
        });
        svg += `<text x="${width - right + 12}" y="${y + 17}" class="bar-label">${fmt(total)}</text>`;
      });
      svg += `</svg>`;
      $("qualityChart").innerHTML = svg;
      bindTooltips($("qualityChart"));
    }

    function renderHeatmap(rows) {
      heatmapRows = rows;
      $("exportHeatmapCsv").disabled = !rows.length;
      const sources = [...new Set(rows.map(r => r.source))].sort();
      const years = [...new Set(rows.map(r => Number(r.year)).filter(Boolean))].sort((a, b) => a - b);
      const byKey = new Map(rows.map(r => [`${r.source}::${r.year}`, Number(r.paper_count || 0)]));
      const maxCount = Math.max(1, ...rows.map(r => Number(r.paper_count || 0)));
      const cell = 22, left = 190, top = 42, width = left + years.length * cell + 40, height = top + sources.length * cell + 32;
      let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;
      years.forEach((year, j) => {
        const x = left + j * cell + 12;
        svg += `<text x="${x}" y="34" transform="rotate(-60 ${x} 34)" font-size="10" fill="#667085">${year}</text>`;
      });
      sources.forEach((src, i) => {
        const y = top + i * cell;
        svg += `<text x="8" y="${y + 15}" class="bar-label">${esc(src)}</text>`;
        years.forEach((year, j) => {
          const value = byKey.get(`${src}::${year}`) || 0;
          const intensity = value ? clamp(Math.log1p(value) / Math.log1p(maxCount), 0.08, 1) : 0;
          const color = value ? `rgba(37, 99, 235, ${intensity})` : "#f1f5f9";
          const tip = dataTip("Year distribution", [
            ["Source", src],
            ["Year", year],
            ["Papers", fmt(value)]
          ]);
          svg += `<rect class="mark" data-tip="${tip}" x="${left + j * cell}" y="${y}" width="19" height="19" fill="${color}"></rect>`;
        });
      });
      svg += `</svg>`;
      $("heatmap").innerHTML = svg;
      bindTooltips($("heatmap"));
      renderSourceButtons(sources, rows);
      renderSourceYearChart(sources[0], rows);
    }

    function renderSourceButtons(sources, rows) {
      $("sourceButtons").innerHTML = sources.map((src, i) => `<button data-source="${esc(src)}" class="${i === 0 ? "active" : ""}">${esc(src)}</button>`).join("");
      $("sourceButtons").querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          $("sourceButtons").querySelectorAll("button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          renderSourceYearChart(btn.dataset.source, rows);
        });
      });
    }

    function renderSourceYearChart(source, rows) {
      const years = [...new Set(rows.map(r => Number(r.year)).filter(Boolean))].sort((a, b) => a - b);
      const byYear = new Map(
        rows.filter(r => r.source === source).map(r => [Number(r.year), Number(r.paper_count || 0)])
      );
      const items = years.map(year => ({ year, paper_count: byYear.get(year) || 0 }));
      const max = Math.max(1, ...items.map(r => Number(r.paper_count || 0)));
      const barW = 18, gap = 4, left = 54, bottom = 56, top = 18, height = 320;
      const width = left + 12 + items.length * (barW + gap) + 24;
      let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;
      svg += `<text x="${left}" y="14" font-size="13" fill="#667085">${esc(source)}</text>`;
      svg += `<line x1="${left}" y1="${height - bottom}" x2="${width - 12}" y2="${height - bottom}" class="axis"/>`;
      svg += `<line x1="${left}" y1="${top}" x2="${left}" y2="${height - bottom}" class="axis"/>`;
      items.forEach((r, i) => {
        const value = Number(r.paper_count || 0);
        const x = left + 12 + i * (barW + gap);
        const h = (value / max) * (height - bottom - top - 18);
        const y = height - bottom - h;
        const tip = dataTip("Source year count", [
          ["Source", source],
          ["Year", r.year],
          ["Papers", fmt(value)]
        ]);
        if (value > 0) {
          svg += `<rect class="mark" data-tip="${tip}" x="${x}" y="${y}" width="${barW}" height="${h}" fill="var(--cyan)"></rect>`;
        } else {
          svg += `<rect class="mark" data-tip="${tip}" x="${x}" y="${height - bottom - 1}" width="${barW}" height="1" fill="#e2e8f0"></rect>`;
        }
        svg += `<text x="${x + barW / 2}" y="${height - 34}" transform="rotate(-60 ${x + barW / 2} ${height - 34})" font-size="10" text-anchor="end" fill="#667085">${r.year}</text>`;
      });
      svg += `</svg>`;
      $("sourceYearChart").innerHTML = svg;
      bindTooltips($("sourceYearChart"));
    }

    function renderDblpTable(rows) {
      $("dblpTable").innerHTML = `<table>
        <thead><tr><th>Source</th><th>DBLP Source</th><th>Total</th><th>Missing DOI</th><th>Missing Abstract</th><th>Missing Both</th><th>Complete</th></tr></thead>
        <tbody>${rows.map(r => {
          const b = completenessBreakdown(r);
          return `<tr><td>${esc(r.source)}</td><td>${esc(r.dblp_source)}</td><td>${fmt(r.paper_count)}</td><td>${fmt(r.missing_doi_count)}</td><td>${fmt(r.missing_abstract_count)}</td><td>${fmt(b.both)}</td><td>${fmt(r.complete_count)}</td></tr>`;
        }).join("")}</tbody></table>`;
    }

    async function load() {
      $("pageHeader").classList.remove("collapsed");
      const uri = $("uri").value.trim();
      const token = $("token").value.trim();
      const collection = $("statsCollection").value.trim() || "paper_stats";
      localStorage.setItem("zilliz_uri", uri);
      localStorage.setItem("zilliz_token", token);
      $("status").className = "status";
      $("status").textContent = "Loading paper_stats from Zilliz...";
      try {
        const rows = await queryStats(uri, token, collection);
        const data = normalize(rows);
        renderSummary(data);
        renderDblpComposition(data.source_dblp_completeness);
        renderQualityChart(data.source_summary);
        renderHeatmap(data.source_year);
        renderDblpTable(data.source_dblp_completeness);
        $("status").textContent = `Loaded ${fmt(rows.length)} stats rows from ${collection}.`;
        $("pageHeader").classList.add("collapsed");
        $("settingsToggle").textContent = "Show settings";
      } catch (err) {
        $("status").className = "status error";
        $("status").textContent = err.message || String(err);
        $("pageHeader").classList.remove("collapsed");
      }
    }

    $("loadBtn").addEventListener("click", load);
    $("exportHeatmapCsv").addEventListener("click", exportHeatmapCsv);
    $("settingsToggle").addEventListener("click", () => {
      const header = $("pageHeader");
      const collapsed = header.classList.toggle("collapsed");
      $("settingsToggle").textContent = collapsed ? "Show settings" : "Hide settings";
    });
    if ($("uri").value && $("token").value) load();
  </script>
</body>
</html>
